<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Step3D animated technical mark</title>
  <desc id="desc">Animated precise pixel robot mark for Step3D on a transparent background</desc>
  <style>
    .ink{fill:#171615}.paper{fill:#f7f4ee}.cyan{fill:#22d3ee}.orange{fill:#ff6b3d}.line{stroke:#171615;stroke-width:14;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#22d3ee;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.float{animation:float 5.2s ease-in-out infinite;transform-origin:256px 260px}.orbit{animation:orbit 7.5s linear infinite;transform-origin:256px 256px}.blink{animation:blink 4.4s steps(1,end) infinite}.pulse{animation:pulse 2.8s ease-in-out infinite}.scan{animation:scan 3.4s ease-in-out infinite}.shadow{fill:#171615;opacity:.08;animation:shadow 5.2s ease-in-out infinite;transform-origin:256px 438px}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes shadow{0%,100%{transform:scaleX(.86);opacity:.06}50%{transform:scaleX(1.08);opacity:.12}}@keyframes orbit{to{transform:rotate(360deg)}}@keyframes blink{0%,88%,100%{opacity:1}91%,94%{opacity:.16}}@keyframes pulse{0%,100%{opacity:.72;transform:scale(.96)}50%{opacity:1;transform:scale(1)}}@keyframes scan{0%,100%{transform:translateY(-34px);opacity:0}18%,58%{opacity:.9}72%{transform:translateY(34px);opacity:0}}@media (prefers-reduced-motion:reduce){*{animation:none!important}.blink,.pulse{opacity:1}}
  </style>
  <ellipse class="shadow" cx="256" cy="438" rx="150" ry="22"/>
  <g class="orbit" opacity=".9">
