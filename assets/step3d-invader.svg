    <rect class="ink" x="152" y="194" width="208" height="156" rx="18"/>
    <rect class="paper blink" x="180" y="232" width="58" height="48" rx="8"/>
    <rect class="paper blink" x="274" y="232" width="58" height="48" rx="8"/>
    <rect class="cyan scan" x="176" y="214" width="160" height="8" rx="4"/>
    <rect class="paper" x="206" y="316" width="30" height="22" rx="5" opacity=".92"/>
    <rect class="paper" x="248" y="316" width="30" height="22" rx="5" opacity=".92"/>
    <rect class="paper" x="290" y="316" width="30" height="22" rx="5" opacity=".92"/>
    <path class="line" d="M212 154v-42h88v42"/>
