<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">STEP_3D invader</title>
  <desc id="desc">Animated pixel invader logo for STEP_3D on a transparent background</desc>
  <style>
    :root { color-scheme: light; }
    .body { fill:#171615; }
    .eye { fill:#f7f4ee; animation: blink 4.8s steps(1,end) infinite; }
    .accent { fill:#22d3ee; animation: visorPulse 3.2s ease-in-out infinite; }
    .spark { fill:#ff6b3d; animation: sparkPulse 2.4s ease-in-out infinite; }
    .float { animation: hover 5.4s ease-in-out infinite; transform-origin:256px 256px; }
    .shadow { fill:#171615; opacity:.08; animation: shadow 5.4s ease-in-out infinite; transform-origin:256px 438px; }
    .scan { fill:#f7f4ee; opacity:.0; animation: scan 3.2s linear infinite; }
    .beam { fill:#22d3ee; opacity:.0; animation: beam 4.8s ease-in-out infinite; }
    .pixel { fill:#22d3ee; opacity:.0; animation: twinkle 3.6s steps(1,end) infinite; }
    .pixel:nth-of-type(2) { animation-delay:.7s; }
    .pixel:nth-of-type(3) { animation-delay:1.4s; }
    @keyframes hover { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-12px); } }
    @keyframes shadow { 0%,100%{ transform:scaleX(.9); opacity:.06; } 50%{ transform:scaleX(1.08); opacity:.12; } }
    @keyframes blink { 0%,90%,100%{ opacity:1; } 92%,95%{ opacity:.14; } }
    @keyframes visorPulse { 0%,100%{ opacity:.76; } 50%{ opacity:1; } }
    @keyframes sparkPulse { 0%,100%{ opacity:.68; transform:scale(.94); } 50%{ opacity:1; transform:scale(1); } }
    @keyframes scan { 0%{ opacity:0; transform:translateY(-24px); } 12%{ opacity:.24; } 42%{ opacity:.24; } 52%,100%{ opacity:0; transform:translateY(92px); } }
    @keyframes beam { 0%,72%,100%{ opacity:0; transform:translateY(-8px) scaleY(.86); } 80%,90%{ opacity:.12; transform:translateY(0) scaleY(1); } }
    @keyframes twinkle { 0%,74%,100%{ opacity:0; } 76%,82%{ opacity:.9; } }
    @media (prefers-reduced-motion: reduce) { * { animation:none!important; } .eye,.accent,.spark { opacity:1; } }
  </style>

  <ellipse class="shadow" cx="256" cy="444" rx="152" ry="22"/>

  <g class="float">
    <path class="beam" d="M184 388h144l52 92H132l52-92Z"/>

    <!-- tiny signal pixels -->
    <rect class="pixel" x="116" y="118" width="18" height="18" rx="4"/>
    <rect class="pixel" x="382" y="126" width="16" height="16" rx="4"/>
    <rect class="pixel" x="354" y="70" width="14" height="14" rx="3"/>

    <!-- antenna -->
    <rect class="spark" x="236" y="52" width="40" height="40" rx="8"/>
    <rect class="body" x="244" y="96" width="24" height="32" rx="6"/>

    <!-- visor -->
    <rect class="accent" x="176" y="132" width="160" height="24" rx="6"/>
    <rect class="scan" x="188" y="136" width="136" height="6" rx="3"/>

    <!-- pixel body -->
    <rect class="body" x="128" y="168" width="64" height="48" rx="8"/>
    <rect class="body" x="208" y="168" width="96" height="48" rx="8"/>
    <rect class="body" x="320" y="168" width="64" height="48" rx="8"/>

    <rect class="body" x="96" y="216" width="320" height="64" rx="10"/>
    <rect class="body" x="64" y="280" width="384" height="56" rx="10"/>
    <rect class="body" x="112" y="336" width="288" height="48" rx="10"/>

    <!-- eyes -->
    <rect class="eye" x="160" y="236" width="56" height="44" rx="6"/>
    <rect class="eye" x="296" y="236" width="56" height="44" rx="6"/>

    <!-- mouth pixels -->
    <rect class="eye" x="184" y="320" width="32" height="24" rx="5" opacity=".9"/>
    <rect class="eye" x="240" y="320" width="32" height="24" rx="5" opacity=".9"/>
    <rect class="eye" x="296" y="320" width="32" height="24" rx="5" opacity=".9"/>

    <!-- arms -->
    <rect class="body" x="48" y="248" width="48" height="64" rx="9"/>
    <rect class="body" x="416" y="248" width="48" height="64" rx="9"/>

    <!-- legs -->
    <rect class="body" x="128" y="384" width="48" height="64" rx="9"/>
    <rect class="body" x="232" y="384" width="48" height="64" rx="9"/>
    <rect class="body" x="336" y="384" width="48" height="64" rx="9"/>
  </g>
</svg>
